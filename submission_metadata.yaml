ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion, code, and documentation, as an
  engineering collaborator. Every design decision was validated against the actual
  100K dataset (distribution analysis, honeypot calibration, prefilter sizing,
  behavioral percentiles) — see the git history for the real iteration. No candidate
  data was sent to any hosted LLM; all ranking runs locally on CPU with no network.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A JD-agnostic, two-stage retrieve->rank pipeline. The JD is parsed into a structured
  spec (jd_spec) — titles, experience band, locations, must-have/disqualifier concepts,
  evidence terms — so the ranker is not hardcoded to one JD. Stage 1 (recall) surgically
  gates honeypots and keeps only candidates whose title or career-description *evidence*
  matches the JD, cutting 100K to ~2.6K. Data analysis showed skills lists are uniform
  noise (the keyword-stuffer trap), so fit is driven by domain evidence in career
  descriptions, not skills. Stage 2 (rerank) scores composite = fit x availability x
  (1 - disqualifier) x authenticity, where availability is a behavioral multiplier
  calibrated to the pool's measured percentiles (per the JD's instruction to down-weight
  unavailable candidates). Honeypot detection uses sharp impossibilities only; a
  grad-year heuristic that false-flagged ~21K real candidates was rejected. Runtime ~14s
  on CPU, no network. Semantic similarity embeds evidence text (not skills) against the
  JD's ideal-candidate paragraph.

