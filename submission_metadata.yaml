# AI tools declaration  (transparency only; honest declaration is not penalized)
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion, code, and documentation, as an
  engineering collaborator. Every design decision was validated against the actual
  100K dataset (distribution analysis, honeypot calibration, prefilter sizing,
  behavioral percentiles) — see the git history for the real iteration. No candidate
  data was sent to any hosted LLM; all ranking runs locally on CPU with no network.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A JD-agnostic, two-stage retrieve->rank pipeline. The JD is parsed into a structured
  spec (jd_spec) — titles, experience band, locations, must-have/disqualifier concepts,
  evidence terms — so the ranker is not hardcoded to one JD; unknown domains fall back to
  terms derived from the JD text. Stage 1 (recall) surgically gates honeypots and keeps
  only candidates whose title or career-description *evidence* matches the JD, cutting
  100K to ~2.6K. Data analysis showed skills lists are uniform noise (the keyword-stuffer
  trap), so fit is driven by domain evidence in career descriptions, not skills. Stage 2
  (rerank) scores each candidate as relevance x reachability, taken from the JD's own
  "great fit but not actually available" framing: relevance is trust- and red-flag-
  adjusted JD fit (evidence, title, semantic, product-vs-services, experience, stability,
  location), and reachability is a behavioral availability multiplier calibrated to the
  pool's measured percentiles. Honeypot detection uses sharp impossibilities only; a
  grad-year heuristic that false-flagged ~21K real candidates was rejected. Semantic
  similarity embeds evidence text (not skills); TF-IDF by default, optional BGE-small
  embeddings. Runtime ~16s on CPU, <2GB RAM, no network. 16-test suite; 0 honeypots in
  the top 100.

